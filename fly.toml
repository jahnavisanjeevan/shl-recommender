# fly.toml — for deployment on fly.io (free tier)
# Run: fly launch --no-deploy, then fly secrets set ANTHROPIC_API_KEY=sk-..., then fly deploy

app = "shl-recommender"
primary_region = "lhr"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
